<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A Bouquet That Never Wilts 🌸</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/bouquet.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ==========================
            LOADING SCREEN
    =========================== -->

    <div id="loader">

        <div class="loader-content">

            <img src="assets/bouquet.png"
                 alt="Bouquet">

            <h2>EverBloom</h2>

            <p>Preparing your bouquet...</p>

        </div>

    </div>

    <!-- ==========================
            BACKGROUND
    =========================== -->

    <div class="background"></div>

    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- Floating Petals -->
    <div id="petals"></div>

    <!-- ==========================
            HERO
    =========================== -->

    <section class="hero">

        <h1>

            A Bouquet

            <br>

            That Never Wilts 🌸

        </h1>

        <div class="buttons">

            <button id="yes">

                Open My Bouquet

            </button>

            <button id="no">

                No

            </button>

        </div>

        <p class="footer">

            EverBloom • Made with 🤍 by Sharvesh

        </p>

    </section>

    <!-- JavaScript -->
    <script src="js/app.js"></script>

</body>

</html>
