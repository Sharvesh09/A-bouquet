<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EverBloom • Bouquet</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/bouquet.css">

</head>

<body>

    <!-- Background -->
    <div class="background"></div>

    <!-- Floating Petals -->
    <div id="petals"></div>

    <!-- Soft Glow -->
    <div class="glow glow-left"></div>
    <div class="glow glow-right"></div>

    <!-- Main Content -->
    <main class="container">

      <div class="bouquet-section">

    <div class="bouquet">

        <!-- Flowers -->

        <img src="assets/flowers/lily.png"
             class="flower lily">

        <img src="assets/flowers/tulipbg.png"
             class="flower tulip1">

        <img src="assets/flowers/tulipbg.png"
             class="flower tulip2">

        <img src="assets/flowers/lavendar.png"
             class="flower lavender">

        <img src="assets/flowers/hydra.png"
             class="flower hydra">

        <img src="assets/flowers/babybreath.png"
             class="flower babybreath">

        <img src="assets/flowers/rose.png"
             class="flower rose">

        <img src="assets/flowers/daisy.png"
             class="flower daisy">

        <!-- Wrapper -->

        <img src="assets/wrapper/white.png"
             class="wrapper">

        <!-- Ribbon -->

        <img src="assets/ribbon/whitebow.png"
             class="ribbon">

    </div>

</div>

        <button id="customizeBtn">

            Customize Bouquet

        </button>

    </main>

    <script src="js/bouquet.js"></script>

</body>

</html>
