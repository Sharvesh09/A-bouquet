<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EverBloom • Bouquet</title>

    <link rel="icon"
          type="image/png"
          href="assets/bouquet.png">

    <!-- Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/bouquet.css">

</head>

<body>

    <!-- Background -->

    <div class="background"></div>

    <div class="glow glow-left"></div>

    <div class="glow glow-right"></div>

    <!-- Floating Petals -->

    <div id="petals"></div>

    <!-- Sparkles -->

    <div class="sparkles">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <!-- Main -->

    <main class="hero">

        <div class="bouquet-container">

            <img
                id="bouquet"
                src="assets/bouquet.png"
                alt="Bouquet">

        </div>

        <button id="letterBtn">

            💌 Read My Letter

        </button>

    </main>

    <!-- Letter -->

    <div id="overlay">

        <div id="letter">

            <button id="close">

                ✕

            </button>

            <h1>

                For You 🌸

            </h1>

            <div class="letter-text">

                <p>

                    Flowers are meant to be admired,

                    but they eventually fade.

                </p>

                <br>

                <p>

                    So here's a bouquet

                    that never smells,

                    never spoils,

                    and stays in your hands forever.

                </p>

                <br><br>

                <div class="signature">

                    — Sharvesh 

                </div>

            </div>

        </div>

    </div>

    <script src="js/bouquet.js"></script>

</body>

</html>
